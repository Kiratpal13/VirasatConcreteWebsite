name: Weekly Blog Publishing

on:
  schedule:
    # Every Wednesday at 9:00 AM UTC (this publishes the blog automatically)
    - cron: '0 9 * * 3'
  
  # Allow manual triggering
  workflow_dispatch:

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Create commit message
        id: commit_msg
        run: |
          DATE=$(date +'%B %d, %Y')
          echo "msg=Weekly blog published - $DATE" >> $GITHUB_OUTPUT
      
      - name: Commit any uncommitted changes
        continue-on-error: true
        run: |
          git add -A
          git commit -m "Auto-publish weekly blog - $(date +'%Y-%m-%d')"
      
      - name: Push changes
        continue-on-error: true
        run: |
          git push origin main

  # Optional: Send notification after publishing
  notify:
    runs-on: ubuntu-latest
    needs: publish-blog
    if: always()
    
    steps:
      - name: Log publishing status
        run: |
          echo "✅ Weekly blog publishing workflow completed"
          echo "Next scheduled publish: $(date -d 'next wednesday 9:00 AM UTC' +'%A, %B %d, %Y at %I:%M %p UTC')"
